name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-review-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run publication-review suite with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest --cov=qrope --cov-report=term-missing --cov-report=xml \
            tests/test_scoring_api.py \
            tests/test_phasewrap_alias.py \
            tests/test_qsim.py \
            tests/test_stage11_phasewrap_theory.py \
            tests/test_stage12_ruler_retrieval.py \
            tests/test_env_utils.py \
            tests/test_publication_package_verifier.py \
            tests/test_publication_verify_cli.py \
            tests/test_stage216_218_full_replacement_interpretation.py \
            tests/test_stage219_rope_substitution_gate.py

      - name: Check README verifier output
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/check_readme_verifier_output.py

      - name: Run public-surface smoke and artifact-integrity checks
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python scripts/smoke_public_surface.py

      - name: Run lightweight secret-hygiene scan
        run: |
          python scripts/scan_secret_hygiene.py

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

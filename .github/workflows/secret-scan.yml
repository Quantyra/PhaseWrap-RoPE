name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install gitleaks CLI
        run: |
          go install github.com/gitleaks/gitleaks/v8@v8.30.1
          "$HOME/go/bin/gitleaks" version

      - name: Scan repository history for secrets
        run: |
          "$HOME/go/bin/gitleaks" detect --source . --redact --verbose --exit-code 1

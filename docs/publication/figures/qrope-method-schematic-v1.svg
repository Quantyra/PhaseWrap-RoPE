<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">PhaseWrap-RoPE phase-wrap scoring schematic</title>
  <desc id="desc">A claim-bounded schematic from modular residuals to signed margins, SQR score, and small-circuit witness.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/>
      <stop offset="1" stop-color="#e7f0ed"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Georgia, serif; fill: #1d2523; }
      .sub { font: 500 16px Georgia, serif; fill: #56645f; }
      .label { font: 700 17px Georgia, serif; fill: #1d2523; }
      .small { font: 500 13px Georgia, serif; fill: #56645f; }
      .tiny { font: 500 11px Georgia, serif; fill: #6d7974; }
      .mono { font: 700 14px Consolas, monospace; fill: #1d2523; }
      .panel { fill: #fffdf8; stroke: #cfc6b6; stroke-width: 1.6; rx: 24; }
      .ink { stroke: #1d2523; stroke-width: 2; fill: none; }
      .grid { stroke: #d7d0c2; stroke-width: 1; stroke-dasharray: 4 7; }
      .teal { fill: #0f766e; }
      .amber { fill: #b7791f; }
      .red { fill: #9f3a38; }
      .blue { fill: #2f5d86; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#paper)"/>
  <text x="64" y="74" class="title">PhaseWrap-RoPE phase-wrap scoring</text>
  <text x="64" y="105" class="sub">Conceptual method figure; formulas in the paper are normative.</text>
  <rect x="70" y="155" width="240" height="135" class="panel"/>
  <text x="100" y="205" class="label">1. Wrapped residuals</text><text x="100" y="235" class="mono">r8, r12</text><text x="100" y="260" class="small">periods 8 and 12</text>
  <path d="M315 222 H410" class="ink"/><path d="M398 210 L418 222 L398 234" class="ink"/>
  <rect x="430" y="155" width="270" height="135" class="panel"/>
  <text x="460" y="197" class="label">2. One-step margins</text><text x="460" y="229" class="mono">m8 = cos(r8)-cos(pi/4)</text><text x="460" y="254" class="mono">m12 = cos(r12)-cos(pi/6)</text>
  <path d="M705 222 H800" class="ink"/><path d="M788 210 L808 222 L788 234" class="ink"/>
  <rect x="820" y="155" width="310" height="135" class="panel"/>
  <text x="850" y="203" class="label">3. Cross-band score</text><text x="850" y="236" class="mono">SQR = m8 * m12</text><text x="850" y="260" class="small">bounded label from fixed grid scale</text>
  <rect x="160" y="385" width="380" height="150" class="panel"/>
  <text x="195" y="433" class="label">Product-state hardware witness</text><text x="195" y="463" class="mono">RY(theta0), RY(theta1), measure</text><text x="195" y="491" class="small">Published Stage 4 evidence: one backend/date only.</text>
  <rect x="660" y="385" width="380" height="150" class="panel"/>
  <text x="695" y="433" class="label">Entangling CX variant</text><text x="695" y="463" class="mono">RY, RY, CX(q0-&gt;q1), measure</text><text x="695" y="491" class="small">Bounded IBM and Braket evidence.</text>
  <path d="M565 290 C565 340 350 340 350 380" class="ink"/><path d="M565 290 C565 340 850 340 850 380" class="ink"/>
  <rect x="300" y="585" width="600" height="44" rx="16" fill="#fffdf8" stroke="#cfc6b6"/>
  <text x="333" y="613" class="small">Claim boundary: method and bounded evidence lane, not broad quantum advantage.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">QRoPE replication lane status</title>
  <desc id="desc">Claim-bounded chart showing one completed product-state hardware packet and four unexecuted replication lanes.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/>
      <stop offset="1" stop-color="#e7f0ed"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Georgia, serif; fill: #1d2523; }
      .sub { font: 500 16px Georgia, serif; fill: #56645f; }
      .label { font: 700 17px Georgia, serif; fill: #1d2523; }
      .small { font: 500 13px Georgia, serif; fill: #56645f; }
      .tiny { font: 500 11px Georgia, serif; fill: #6d7974; }
      .mono { font: 700 14px Consolas, monospace; fill: #1d2523; }
      .panel { fill: #fffdf8; stroke: #cfc6b6; stroke-width: 1.6; rx: 24; }
      .ink { stroke: #1d2523; stroke-width: 2; fill: none; }
      .grid { stroke: #d7d0c2; stroke-width: 1; stroke-dasharray: 4 7; }
      .teal { fill: #0f766e; }
      .amber { fill: #b7791f; }
      .red { fill: #9f3a38; }
      .blue { fill: #2f5d86; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#paper)"/>
  <text x="64" y="74" class="title">Replication status ledger</text>
  <text x="64" y="105" class="sub">Source: replication-ledger.json. Completed evidence and blocked lanes are shown separately.</text>
  <rect x="80" y="155" width="1040" height="400" class="panel"/>
  <text x="120" y="205" class="label">Lane</text><text x="470" y="205" class="label">Circuit family</text><text x="820" y="205" class="label">Status</text>
  <line x1="115" y1="225" x2="1085" y2="225" stroke="#cfc6b6" stroke-width="2"/>
  <circle cx="135" cy="270" r="13" class="teal"/><text x="160" y="276" class="small">Stage 4 product original</text><text x="470" y="276" class="mono">two_qubit_zz...</text><rect x="820" y="248" width="190" height="34" rx="14" fill="#d9efe9"/><text x="844" y="271" class="small">published completed</text>
  <circle cx="135" cy="330" r="13" class="amber"/><text x="160" y="336" class="small">Product rerun A</text><text x="470" y="336" class="mono">two_qubit_zz...</text><rect x="820" y="308" width="230" height="34" rx="14" fill="#f7e6c7"/><text x="844" y="331" class="small">blocked: credentials</text>
  <circle cx="135" cy="390" r="13" class="amber"/><text x="160" y="396" class="small">Product rerun B</text><text x="470" y="396" class="mono">two_qubit_zz...</text><rect x="820" y="368" width="230" height="34" rx="14" fill="#f7e6c7"/><text x="844" y="391" class="small">blocked: backend/date</text>
  <circle cx="135" cy="450" r="13" class="red"/><text x="160" y="456" class="small">CX rerun A</text><text x="470" y="456" class="mono">two_qubit_cx...</text><rect x="820" y="428" width="245" height="34" rx="14" fill="#f1d7d5"/><text x="844" y="451" class="small">implemented, not run</text>
  <circle cx="135" cy="510" r="13" class="red"/><text x="160" y="516" class="small">CX rerun B</text><text x="470" y="516" class="mono">two_qubit_cx...</text><rect x="820" y="488" width="245" height="34" rx="14" fill="#f1d7d5"/><text x="844" y="511" class="small">implemented, not run</text>
  <rect x="210" y="585" width="780" height="48" rx="18" fill="#fffdf8" stroke="#cfc6b6"/>
  <text x="244" y="615" class="small">Rule: no cross-backend, cross-date, or entangling evidence claim until a lane has raw counts and verifier output.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">QRoPE Stage 4 witness versus control metrics</title>
  <desc id="desc">Chart comparing witness and control MAE and rank correlation for the single published Stage 4 hardware packet.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/>
      <stop offset="1" stop-color="#e7f0ed"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Georgia, serif; fill: #1d2523; }
      .sub { font: 500 16px Georgia, serif; fill: #56645f; }
      .label { font: 700 17px Georgia, serif; fill: #1d2523; }
      .small { font: 500 13px Georgia, serif; fill: #56645f; }
      .tiny { font: 500 11px Georgia, serif; fill: #6d7974; }
      .mono { font: 700 14px Consolas, monospace; fill: #1d2523; }
      .panel { fill: #fffdf8; stroke: #cfc6b6; stroke-width: 1.6; rx: 24; }
      .ink { stroke: #1d2523; stroke-width: 2; fill: none; }
      .grid { stroke: #d7d0c2; stroke-width: 1; stroke-dasharray: 4 7; }
      .teal { fill: #0f766e; }
      .amber { fill: #b7791f; }
      .red { fill: #9f3a38; }
      .blue { fill: #2f5d86; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#paper)"/>
  <text x="64" y="74" class="title">Stage 4 metrics, single hardware packet</text>
  <text x="64" y="105" class="sub">Source: evaluation.json. Backend ibm_fez, 16 rows, 4096 shots per row. Not a cross-backend claim.</text>
  <rect x="74" y="155" width="500" height="390" class="panel"/>
  <text x="112" y="206" class="label">Mean absolute error</text><text x="112" y="232" class="small">Lower is better</text>
  <line x1="135" y1="480" x2="520" y2="480" class="ink"/><line x1="135" y1="480" x2="135" y2="280" class="ink"/>
  <line x1="135" y1="410" x2="520" y2="410" class="grid"/><line x1="135" y1="340" x2="520" y2="340" class="grid"/>
  <text x="102" y="485" class="tiny">0.00</text><text x="102" y="415" class="tiny">0.10</text><text x="102" y="345" class="tiny">0.20</text>
  <rect x="230" y="467" width="86" height="13" rx="5" class="teal"/><rect x="390" y="328" width="86" height="152" rx="5" class="amber"/>
  <text x="218" y="510" class="small">Witness</text><text x="383" y="510" class="small">Control</text>
  <text x="214" y="454" class="mono">0.018382</text><text x="374" y="315" class="mono">0.217262</text>
  <rect x="626" y="155" width="500" height="390" class="panel"/>
  <text x="664" y="206" class="label">Rank correlation</text><text x="664" y="232" class="small">Higher is better</text>
  <line x1="690" y1="480" x2="1075" y2="480" class="ink"/><line x1="690" y1="480" x2="690" y2="280" class="ink"/>
  <line x1="690" y1="444" x2="1075" y2="444" stroke="#92897a" stroke-width="2"/><line x1="690" y1="410" x2="1075" y2="410" class="grid"/><line x1="690" y1="340" x2="1075" y2="340" class="grid"/>
  <text x="650" y="485" class="tiny">-0.25</text><text x="660" y="449" class="tiny">0.00</text><text x="660" y="415" class="tiny">0.50</text><text x="660" y="345" class="tiny">1.00</text>
  <rect x="785" y="322" width="86" height="122" rx="5" class="teal"/><rect x="945" y="444" width="86" height="25" rx="5" class="amber"/>
  <text x="773" y="510" class="small">Witness</text><text x="938" y="510" class="small">Control</text>
  <text x="770" y="309" class="mono">0.876558</text><text x="929" y="493" class="mono">-0.176940</text>
  <rect x="250" y="585" width="700" height="48" rx="18" fill="#fffdf8" stroke="#cfc6b6"/>
  <text x="285" y="615" class="small">Interpretation: hardware-positive for this frozen packet/backend/date/calibration context only.</text>
</svg>

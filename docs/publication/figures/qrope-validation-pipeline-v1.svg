<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">QRoPE deterministic validation pipeline</title>
  <desc id="desc">Validation pipeline showing packet freeze, credentialled execution, raw-count capture, offline recomputation, and replication ledger update.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/>
      <stop offset="1" stop-color="#e7f0ed"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Georgia, serif; fill: #1d2523; }
      .sub { font: 500 16px Georgia, serif; fill: #56645f; }
      .label { font: 700 17px Georgia, serif; fill: #1d2523; }
      .small { font: 500 13px Georgia, serif; fill: #56645f; }
      .tiny { font: 500 11px Georgia, serif; fill: #6d7974; }
      .mono { font: 700 14px Consolas, monospace; fill: #1d2523; }
      .panel { fill: #fffdf8; stroke: #cfc6b6; stroke-width: 1.6; rx: 24; }
      .ink { stroke: #1d2523; stroke-width: 2; fill: none; }
      .grid { stroke: #d7d0c2; stroke-width: 1; stroke-dasharray: 4 7; }
      .teal { fill: #0f766e; }
      .amber { fill: #b7791f; }
      .red { fill: #9f3a38; }
      .blue { fill: #2f5d86; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#paper)"/>
  <text x="64" y="74" class="title">Deterministic validation lane</text>
  <text x="64" y="105" class="sub">Recomputation is not replication; new hardware evidence requires new raw counts and metadata.</text>
  <g transform="translate(70 170)"><rect width="190" height="150" class="panel"/><circle cx="38" cy="42" r="20" class="blue"/><text x="32" y="49" fill="#fff" font-family="Georgia" font-size="20" font-weight="700">1</text><text x="72" y="47" class="label">Freeze</text><text x="30" y="84" class="small">fixed rows</text><text x="30" y="108" class="small">fixed shots</text><text x="30" y="132" class="small">packet id</text></g>
  <g transform="translate(290 170)"><rect width="190" height="150" class="panel"/><circle cx="38" cy="42" r="20" class="blue"/><text x="32" y="49" fill="#fff" font-family="Georgia" font-size="20" font-weight="700">2</text><text x="72" y="47" class="label">Execute</text><text x="30" y="84" class="small">credentialled</text><text x="30" y="108" class="small">hardware job</text><text x="30" y="132" class="small">or blocked</text></g>
  <g transform="translate(510 170)"><rect width="190" height="150" class="panel"/><circle cx="38" cy="42" r="20" class="teal"/><text x="32" y="49" fill="#fff" font-family="Georgia" font-size="20" font-weight="700">3</text><text x="72" y="47" class="label">Capture</text><text x="30" y="84" class="small">raw counts</text><text x="30" y="108" class="small">backend metadata</text><text x="30" y="132" class="small">calibration</text></g>
  <g transform="translate(730 170)"><rect width="190" height="150" class="panel"/><circle cx="38" cy="42" r="20" class="teal"/><text x="32" y="49" fill="#fff" font-family="Georgia" font-size="20" font-weight="700">4</text><text x="72" y="47" class="label">Recompute</text><text x="30" y="84" class="small">offline verifier</text><text x="30" y="108" class="small">metrics from</text><text x="30" y="132" class="small">saved counts</text></g>
  <g transform="translate(950 170)"><rect width="190" height="150" class="panel"/><circle cx="38" cy="42" r="20" class="amber"/><text x="32" y="49" fill="#fff" font-family="Georgia" font-size="20" font-weight="700">5</text><text x="72" y="47" class="label">Ledger</text><text x="30" y="84" class="small">completed</text><text x="30" y="108" class="small">negative</text><text x="30" y="132" class="small">or blocked</text></g>
  <path d="M260 245 H290 M480 245 H510 M700 245 H730 M920 245 H950" class="ink"/>
  <rect x="145" y="430" width="910" height="96" rx="24" fill="#fffdf8" stroke="#cfc6b6"/>
  <text x="180" y="469" class="label">Reviewer rule</text><text x="180" y="500" class="small">Saved-count verification checks arithmetic. Independent replication requires a new credentialled execution and ledger update.</text>
</svg>

run:
  seed: 42
  epochs: 25
  batch_size: 32
  learning_rate: 0.0003
  weight_decay: 1.0e-05
  id: v4b-yelp-screening-s42
dataset: yelp
model:
  architecture: qmsan_style
  hidden_dim: 128
  attention_heads: 4
  quantum:
    qubits: 8
    layers: 2
    shots: 2048
backend: sim_quantum_statevector
logging:
  output_root: logs/ablation_runs
  save_checkpoints: true
  save_metrics_json: true
  required_fields:
  - run_id
  - variant
  - dataset
  - seed
  - backend
  - accuracy
  - f1
  - train_loss_final
  - eval_loss
  - qubit_count
  - gate_count_total
  - circuit_depth
  - shot_count
  - noise_model
  - wall_time_sec
  - timestamp_utc
variant:
  id: V4b
  name: q_rope_relative_phase_clipped_ratio_controlled
positional_encoding:
  type: q_rope_relative_phase
  enabled: true
  gate_family: rz
  frequencies:
  - 0.125
  - 0.25
  - 0.5
  - 1.0
  relative_mode: true
  tie_query_key_frequencies: true
  stability_mode: clipped_ratio_controlled
  phase_base: 0.18
  phase_clip: 0.22
  ratio_factor: 0.35
